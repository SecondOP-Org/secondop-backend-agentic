services:
  postgres:
    image: postgres:16-alpine
    container_name: secondop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-secondop_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - secondop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-secondop_db}"]
      interval: 5s
      timeout: 3s
      retries: 15

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: secondop-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@secondop.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - secondop_pgadmin_data:/var/lib/pgadmin

  litellm-postgres:
    image: postgres:16-alpine
    container_name: secondop-litellm-postgres
    profiles: ["ai-gateway"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD:-litellm}
    ports:
      - "${LITELLM_DB_PORT:-5433}:5432"
    volumes:
      - secondop_litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 15

  litellm:
    image: docker.litellm.ai/berriai/litellm:latest
    container_name: secondop-litellm
    profiles: ["ai-gateway"]
    restart: unless-stopped
    depends_on:
      litellm-postgres:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-master-key}
      LITELLM_DATABASE_URL: postgresql://litellm:${LITELLM_POSTGRES_PASSWORD:-litellm}@litellm-postgres:5432/litellm
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm/config.example.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]

volumes:
  secondop_postgres_data:
  secondop_pgadmin_data:
  secondop_litellm_postgres_data:
