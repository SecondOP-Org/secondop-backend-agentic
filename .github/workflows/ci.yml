name: Backend CI

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: secondop_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d secondop_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run lint
        run: npm run lint

      - name: Run tests
        env:
          LANGGRAPH_POSTGRES_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/secondop_ci
        run: npm test -- --runInBand

      - name: Run eval harness
        run: npm run eval:harness

      - name: Run build
        run: npm run build
