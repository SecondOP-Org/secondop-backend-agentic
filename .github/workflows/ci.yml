name: Backend CI

"on":
  push:
    branches:
      - sec-41-investigate-backend-github-actions-zero-job-workflow

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --runInBand

      - name: Run build
        run: npm run build
